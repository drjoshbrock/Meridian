<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1a1a1a">
<title>Meridian — Markdown</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="./icon.svg">
<link id="hljs-css" rel="stylesheet" href="https://esm.sh/highlight.js@11.10.0/styles/github.css">
<style>
  :root {
    --bg: #fff; --bg-elev: #f7f7f8; --border: #e5e5e7;
    --fg: #1a1a1a; --fg-mute: #666; --accent: #06c; --code-bg: #f4f4f6;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: var(--bg); color: var(--fg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body { display: grid; grid-template-rows: auto 1fr; height: 100vh; overflow: hidden; }
  .bar {
    display: flex; gap: 12px; padding: 8px 12px; align-items: center;
    background: var(--bg-elev); border-bottom: 1px solid var(--border);
  }
  .bar > .grp { display: flex; gap: 4px; }
  .title { flex: 1; text-align: center; color: var(--fg-mute); font-size: 13px;
           white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status { margin-left: 8px; font-size: 12px; color: var(--fg-mute); }
  .status.dirty { color: var(--accent); }
  .status.saved::before { content: "✓ "; }
  button, select {
    background: transparent; border: 1px solid transparent; color: var(--fg);
    padding: 5px 10px; font-size: 13px; border-radius: 6px; cursor: pointer; font: inherit;
  }
  button:hover, select:hover { background: var(--border); }
  button.on { background: var(--accent); color: #fff; }
  select { border-color: var(--border); padding: 4px 6px; max-width: 170px; }
  .ws { display: grid; grid-template-columns: 220px 1fr 0; min-height: 0; overflow: hidden; }
  .ws:has(.outline[hidden]) { grid-template-columns: 0 1fr 0; }
  .ws:has(.pv:not([hidden])) { grid-template-columns: 220px 1fr 1fr; }
  .ws:has(.outline[hidden]):has(.pv:not([hidden])) { grid-template-columns: 0 1fr 1fr; }
  .outline {
    background: var(--bg-elev); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 12px; color: var(--fg);
  }
  .outline h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--fg-mute); margin: 0 0 8px;
  }
  .outline ul { list-style: none; margin: 0; padding: 0; }
  .outline ul ul { padding-left: 12px; }
  .outline .ol-row {
    display: flex; align-items: center; gap: 2px;
    border-radius: 4px;
  }
  .outline .ol-row:hover { background: var(--border); }
  .outline .ol-row a {
    flex: 1; min-width: 0; padding: 3px 4px; font-size: 13px;
    color: var(--fg); text-decoration: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .outline .ol-row.l4 a, .outline .ol-row.l5 a, .outline .ol-row.l6 a {
    color: var(--fg-mute); font-size: 12.5px;
  }
  .outline .ol-toggle {
    background: transparent; border: 0; cursor: pointer; padding: 0;
    width: 16px; height: 18px; flex: none;
    font-size: 9px; line-height: 1; color: var(--fg-mute);
    display: inline-flex; align-items: center; justify-content: center;
    transition: transform .12s ease;
  }
  .outline .ol-toggle:hover { color: var(--fg); }
  .outline .ol-spacer { width: 16px; flex: none; }
  .outline li.collapsed > ul { display: none; }
  .outline li.collapsed > .ol-row > .ol-toggle { transform: rotate(-90deg); }
  .ed { overflow: hidden; border-right: 1px solid var(--border); min-width: 0; background: var(--bg); color: var(--fg); }
  .ws:has(.pv[hidden]) .ed { border-right: none; }
  #editor { height: 100%; }
  .pv { overflow-y: auto; min-width: 0; background: var(--bg); color: var(--fg); }
  .md {
    max-width: 780px; margin: 0 auto; padding: 40px 36px 96px;
    line-height: 1.7; font-size: 16px;
    color: var(--fg); background: var(--bg);
  }
  .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 {
    font-weight: 600; line-height: 1.25; margin: 1.8em 0 .6em;
  }
  .md h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: .3em; margin-top: 0; }
  .md h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  .md h3 { font-size: 1.25em; }
  .md a { color: var(--accent); }
  .md p { margin: .8em 0; }
  .md code:not(pre code) {
    background: var(--code-bg); padding: 2px 6px; border-radius: 4px;
    font-size: .88em; font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .md pre {
    background: var(--code-bg); padding: 14px 16px; border-radius: 8px;
    overflow-x: auto; font-size: 13.5px; line-height: 1.55; margin: 1em 0;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .md pre code.hljs { background: transparent; padding: 0; }
  .md blockquote {
    border-left: 3px solid var(--border); padding: 0 1em;
    color: var(--fg-mute); margin: 1em 0;
  }
  .md table { border-collapse: collapse; margin: 1em 0; display: block; overflow-x: auto; font-size: .95em; }
  .md th, .md td { border: 1px solid var(--border); padding: 6px 12px; text-align: left; }
  .md th { background: var(--bg-elev); font-weight: 600; }
  .md img { max-width: 100%; height: auto; }
  .md hr { border: 0; border-top: 1px solid var(--border); margin: 2em 0; }
  .md ul, .md ol { padding-left: 1.5em; }
  .md li { margin: .25em 0; }
  .md li > input[type="checkbox"] { margin-right: 6px; transform: translateY(1px); }
  .md .mermaid { display: flex; justify-content: center; margin: 1.2em 0; }
  .md .mermaid svg { max-width: 100%; height: auto; }
  .mmd-err { color: #c33; background: var(--code-bg); padding: 10px; border-radius: 6px; font-size: 12px; white-space: pre-wrap; }
  .empty { color: var(--fg-mute); font-size: 12px; padding: 8px; }
  .cm-editor.cm-focused { outline: none !important; }
  @media print {
    .bar, .outline, .ed { display: none !important; }
    .ws { grid-template-columns: 0 0 1fr !important; }
    .pv { overflow: visible; }
    .md { max-width: none; padding: 0; }
    body { overflow: visible; height: auto; }
  }
  @media (max-width: 720px) {
    .ws { grid-template-columns: 0 1fr 0 !important; }
    .ws .pv { display: none; }
    .ws:has(.outline:not([hidden])) { grid-template-columns: 220px 1fr 0 !important; }
  }
  .drop-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    border: 4px dashed var(--accent);
    background: color-mix(in oklab, var(--accent) 12%, transparent);
    display: flex; align-items: center; justify-content: center;
    color: var(--fg); font-size: 18px; font-weight: 600;
    opacity: 0; transition: opacity .15s ease;
  }
  body.dragging .drop-overlay { opacity: 1; }
</style>

<script type="module">
window.addEventListener("error", (e) =>
  console.error("[Meridian] Uncaught error:", e.message, e.error));
window.addEventListener("unhandledrejection", (e) =>
  console.error("[Meridian] Unhandled rejection:", e.reason));

import { marked } from "marked";
import hljs from "highlight.js";
import { EditorState, EditorSelection, Compartment } from "@codemirror/state";
import {
  EditorView, keymap, lineNumbers, highlightActiveLine,
  highlightActiveLineGutter, drawSelection, dropCursor
} from "@codemirror/view";
import { defaultKeymap, history, historyKeymap, indentWithTab } from "@codemirror/commands";
import { markdown, markdownLanguage } from "@codemirror/lang-markdown";
import {
  syntaxHighlighting, indentOnInput, bracketMatching, HighlightStyle
} from "@codemirror/language";
import { searchKeymap, highlightSelectionMatches } from "@codemirror/search";
import { closeBrackets, closeBracketsKeymap } from "@codemirror/autocomplete";
import { tags as tg } from "@lezer/highlight";

/* =====================================================================
   THEMES — to add a new theme, append an entry below. Each theme needs:
     - name:    Display name in the picker
     - type:    "light" or "dark" (affects mermaid theme + system color)
     - vars:    CSS custom properties for the UI (editor + preview follow)
     - hljs:    highlight.js stylesheet name under
                https://esm.sh/highlight.js@11.10.0/styles/<hljs>.css
   ===================================================================== */
const THEMES = {
  light: {
    name: "Light", type: "light", hljs: "github",
    vars: { "--bg":"#ffffff","--bg-elev":"#f7f7f8","--border":"#e5e5e7",
            "--fg":"#1a1a1a","--fg-mute":"#666","--accent":"#0066cc","--code-bg":"#f4f4f6" }
  },
  dark: {
    name: "Dark", type: "dark", hljs: "github-dark",
    vars: { "--bg":"#1a1a1a","--bg-elev":"#242427","--border":"#333337",
            "--fg":"#e8e8ea","--fg-mute":"#8a8a8e","--accent":"#5aa3ff","--code-bg":"#2a2a2e" }
  },
  "solarized-light": {
    name: "Solarized Light", type: "light", hljs: "base16/solarized-light",
    vars: { "--bg":"#fdf6e3","--bg-elev":"#eee8d5","--border":"#93a1a1",
            "--fg":"#586e75","--fg-mute":"#93a1a1","--accent":"#268bd2","--code-bg":"#eee8d5" }
  },
  "solarized-dark": {
    name: "Solarized Dark", type: "dark", hljs: "base16/solarized-dark",
    vars: { "--bg":"#002b36","--bg-elev":"#073642","--border":"#586e75",
            "--fg":"#93a1a1","--fg-mute":"#657b83","--accent":"#268bd2","--code-bg":"#073642" }
  },
  dracula: {
    name: "Dracula", type: "dark", hljs: "base16/dracula",
    vars: { "--bg":"#282a36","--bg-elev":"#343746","--border":"#44475a",
            "--fg":"#f8f8f2","--fg-mute":"#6272a4","--accent":"#bd93f9","--code-bg":"#343746" }
  },
  "catppuccin-mocha": {
    name: "Catppuccin Mocha", type: "dark", hljs: "base16/ocean",
    vars: { "--bg":"#1e1e2e","--bg-elev":"#181825","--border":"#313244",
            "--fg":"#cdd6f4","--fg-mute":"#a6adc8","--accent":"#89b4fa","--code-bg":"#181825" }
  },
  "catppuccin-latte": {
    name: "Catppuccin Latte", type: "light", hljs: "base16/atelier-cave-light",
    vars: { "--bg":"#eff1f5","--bg-elev":"#e6e9ef","--border":"#bcc0cc",
            "--fg":"#4c4f69","--fg-mute":"#6c6f85","--accent":"#1e66f5","--code-bg":"#e6e9ef" }
  },
  "gruvbox-dark": {
    name: "Gruvbox Dark", type: "dark", hljs: "base16/gruvbox-dark-hard",
    vars: { "--bg":"#282828","--bg-elev":"#3c3836","--border":"#504945",
            "--fg":"#ebdbb2","--fg-mute":"#a89984","--accent":"#fabd2f","--code-bg":"#3c3836" }
  },
  "gruvbox-light": {
    name: "Gruvbox Light", type: "light", hljs: "base16/gruvbox-light-hard",
    vars: { "--bg":"#fbf1c7","--bg-elev":"#ebdbb2","--border":"#d5c4a1",
            "--fg":"#3c3836","--fg-mute":"#7c6f64","--accent":"#b57614","--code-bg":"#ebdbb2" }
  },
  "tokyo-night": {
    name: "Tokyo Night", type: "dark", hljs: "tokyo-night-dark",
    vars: { "--bg":"#1a1b26","--bg-elev":"#16161e","--border":"#292e42",
            "--fg":"#c0caf5","--fg-mute":"#565f89","--accent":"#7aa2f7","--code-bg":"#16161e" }
  },
  monokai: {
    name: "Monokai", type: "dark", hljs: "monokai",
    vars: { "--bg":"#272822","--bg-elev":"#1d1e19","--border":"#49483e",
            "--fg":"#f8f8f2","--fg-mute":"#75715e","--accent":"#a6e22e","--code-bg":"#1d1e19" }
  }
};

/* =================== App state =================== */
const $ = (id) => document.getElementById(id);
const state = {
  view: null, handle: null, name: "Untitled.md",
  dirty: false, lastSaved: "", theme: null
};
let renderToken = 0;
let _mermaidMod = null;

/* =================== CodeMirror editor =================== */
const themeCompartment = new Compartment();

function makeCmTheme(isDark) {
  return EditorView.theme({
    "&": { height: "100%", fontSize: "14px",
           backgroundColor: "var(--bg)", color: "var(--fg)" },
    ".cm-scroller": {
      fontFamily: 'ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace',
      lineHeight: "1.65",
      backgroundColor: "var(--bg)", color: "var(--fg)"
    },
    ".cm-content": {
      padding: "16px 0", caretColor: "var(--fg)",
      backgroundColor: "var(--bg)", color: "var(--fg)"
    },
    ".cm-line": { padding: "0 18px" },
    ".cm-gutters": {
      backgroundColor: "var(--bg)", color: "var(--fg-mute)",
      borderRight: "1px solid var(--border)"
    },
    ".cm-activeLine, .cm-activeLineGutter": {
      backgroundColor: "color-mix(in oklab, var(--fg) 6%, transparent)"
    },
    "&.cm-focused": { outline: "none" },
    ".cm-cursor, .cm-dropCursor": { borderLeftColor: "var(--fg)" },
    ".cm-selectionBackground, &.cm-focused > .cm-scroller > .cm-selectionLayer .cm-selectionBackground": {
      backgroundColor: "color-mix(in oklab, var(--accent) 30%, transparent) !important"
    },
    ".cm-tooltip": {
      backgroundColor: "var(--bg-elev)", color: "var(--fg)",
      border: "1px solid var(--border)"
    }
  }, { dark: isDark });
}

const mdHighlight = HighlightStyle.define([
  { tag: tg.heading1, fontSize: "1.35em", fontWeight: "700", color: "var(--fg)" },
  { tag: tg.heading2, fontSize: "1.22em", fontWeight: "700", color: "var(--fg)" },
  { tag: tg.heading3, fontSize: "1.12em", fontWeight: "700", color: "var(--fg)" },
  { tag: [tg.heading4, tg.heading5, tg.heading6], fontWeight: "700", color: "var(--fg)" },
  { tag: tg.strong, fontWeight: "700" },
  { tag: tg.emphasis, fontStyle: "italic" },
  { tag: tg.strikethrough, textDecoration: "line-through" },
  { tag: [tg.link, tg.url], color: "var(--accent)", textDecoration: "underline" },
  { tag: tg.monospace, color: "var(--accent)" },
  { tag: tg.quote, color: "var(--fg-mute)", fontStyle: "italic" },
  { tag: [tg.list, tg.meta], color: "var(--fg-mute)" }
]);

function wrapCmd(a, b) {
  return ({ state, dispatch }) => {
    dispatch(state.update(state.changeByRange((r) => {
      const text = state.sliceDoc(r.from, r.to);
      return {
        changes: { from: r.from, to: r.to, insert: a + text + b },
        range: EditorSelection.range(r.from + a.length, r.from + a.length + text.length)
      };
    })));
    return true;
  };
}

function insertLinkCmd({ state, dispatch }) {
  dispatch(state.update(state.changeByRange((r) => {
    const sel = state.sliceDoc(r.from, r.to);
    const text = sel || "link text";
    const insert = `[${text}](url)`;
    const urlStart = r.from + 1 + text.length + 2;
    return {
      changes: { from: r.from, to: r.to, insert },
      range: EditorSelection.range(urlStart, urlStart + 3)
    };
  })));
  return true;
}

function createEditor(parent, doc, onChange) {
  return new EditorView({
    parent,
    state: EditorState.create({
      doc,
      extensions: [
        lineNumbers(),
        highlightActiveLine(),
        highlightActiveLineGutter(),
        drawSelection(),
        dropCursor(),
        history(),
        indentOnInput(),
        bracketMatching(),
        closeBrackets(),
        highlightSelectionMatches(),
        syntaxHighlighting(mdHighlight),
        markdown({ base: markdownLanguage }),
        EditorView.lineWrapping,
        themeCompartment.of(makeCmTheme(THEMES[state.theme]?.type === "dark")),
        keymap.of([
          ...closeBracketsKeymap, ...defaultKeymap, ...historyKeymap, ...searchKeymap,
          indentWithTab,
          { key: "Mod-b", run: wrapCmd("**", "**") },
          { key: "Mod-i", run: wrapCmd("*", "*") },
          { key: "Mod-`", run: wrapCmd("`", "`") },
          { key: "Mod-k", run: insertLinkCmd }
        ]),
        EditorView.updateListener.of((v) => {
          if (v.docChanged) onChange(v.state.doc.toString());
        })
      ]
    })
  });
}

const getDoc = () => state.view.state.doc.toString();
const setDoc = (s) => state.view.dispatch({
  changes: { from: 0, to: state.view.state.doc.length, insert: s }
});

/* =================== Marked + hljs + mermaid =================== */
marked.use({
  gfm: true,
  breaks: false,
  renderer: {
    code({ text, lang }) {
      if (lang === "mermaid") {
        const id = "mmd-" + Math.random().toString(36).slice(2, 10);
        return `<div class="mermaid" id="${id}" data-mmd="${encodeURIComponent(text)}"></div>`;
      }
      const language = lang && hljs.getLanguage(lang) ? lang : "plaintext";
      const html = hljs.highlight(text, { language, ignoreIllegals: true }).value;
      return `<pre><code class="hljs language-${language}">${html}</code></pre>`;
    }
  }
});

async function getMermaid() {
  if (!_mermaidMod) {
    const mod = await import("mermaid");
    _mermaidMod = mod.default;
  }
  _mermaidMod.initialize({
    startOnLoad: false,
    theme: THEMES[state.theme].type === "dark" ? "dark" : "default",
    securityLevel: "strict",
    fontFamily: "system-ui, -apple-system, sans-serif"
  });
  return _mermaidMod;
}

/* =================== Sanitizer (DOM-walker, no deps) =================== */
const DANGEROUS = new Set(["SCRIPT","STYLE","IFRAME","OBJECT","EMBED","LINK","META","BASE"]);
function sanitize(html) {
  const tpl = document.createElement("template");
  tpl.innerHTML = html;
  const walker = document.createTreeWalker(tpl.content, NodeFilter.SHOW_ELEMENT);
  const remove = [];
  let n;
  while ((n = walker.nextNode())) {
    if (DANGEROUS.has(n.tagName)) { remove.push(n); continue; }
    for (const a of [...n.attributes]) {
      const name = a.name.toLowerCase();
      if (name.startsWith("on")) n.removeAttribute(a.name);
      else if ((name === "href" || name === "src") && /^\s*javascript:/i.test(a.value)) {
        n.setAttribute(a.name, "#");
      }
    }
  }
  for (const x of remove) x.remove();
  return tpl.innerHTML;
}

/* =================== Preview rendering =================== */
function slugify(s, seen) {
  const base = s.toLowerCase().replace(/[^\w\s-]/g, "").trim().replace(/\s+/g, "-") || "section";
  const n = seen.get(base) || 0;
  seen.set(base, n + 1);
  return n === 0 ? base : `${base}-${n}`;
}

async function renderPreview() {
  const my = ++renderToken;
  const html = sanitize(marked.parse(getDoc()));
  if (my !== renderToken) return;
  const pv = $("preview");
  pv.innerHTML = html;

  const seen = new Map();
  const headings = [...pv.querySelectorAll("h1,h2,h3,h4,h5,h6")];
  for (const h of headings) h.id = slugify(h.textContent, seen);
  for (const a of pv.querySelectorAll('a[href^="http"]')) {
    a.target = "_blank"; a.rel = "noopener noreferrer";
  }
  renderOutline(headings.map((h) => ({ level: +h.tagName[1], text: h.textContent, id: h.id })));

  const mmd = pv.querySelectorAll(".mermaid[data-mmd]");
  if (mmd.length) {
    const mermaid = await getMermaid();
    if (my !== renderToken) return;
    for (const el of mmd) {
      const code = decodeURIComponent(el.dataset.mmd);
      try {
        const { svg } = await mermaid.render(el.id + "-svg", code);
        if (my !== renderToken) return;
        el.innerHTML = svg;
      } catch (e) {
        el.innerHTML = `<pre class="mmd-err">${escapeHtml(String(e?.message || e))}\n\n${escapeHtml(code)}</pre>`;
      }
      el.removeAttribute("data-mmd");
    }
  }
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, (c) =>
    ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

function buildHeadingTree(items) {
  const root = { level: 0, children: [] };
  const stack = [root];
  for (const h of items) {
    while (stack[stack.length - 1].level >= h.level) stack.pop();
    const node = { ...h, children: [] };
    stack[stack.length - 1].children.push(node);
    stack.push(node);
  }
  return root.children;
}

function renderOutline(items) {
  const ol = $("ol");
  ol.innerHTML = "";
  if (!items.length) {
    const d = document.createElement("div");
    d.className = "empty"; d.textContent = "No headings yet.";
    ol.appendChild(d); return;
  }

  const renderNodes = (nodes) => {
    const ul = document.createElement("ul");
    for (const n of nodes) {
      const li = document.createElement("li");
      const row = document.createElement("div");
      row.className = "ol-row l" + n.level;

      if (n.children.length) {
        const t = document.createElement("button");
        t.type = "button";
        t.className = "ol-toggle";
        t.textContent = "▼";
        t.setAttribute("aria-label", "Toggle " + n.text);
        t.onclick = (e) => {
          e.preventDefault(); e.stopPropagation();
          li.classList.toggle("collapsed");
        };
        row.appendChild(t);
      } else {
        const s = document.createElement("span");
        s.className = "ol-spacer";
        row.appendChild(s);
      }

      const a = document.createElement("a");
      a.textContent = n.text; a.href = "#" + n.id;
      a.title = n.text;
      a.onclick = (e) => {
        e.preventDefault();
        document.getElementById(n.id)?.scrollIntoView({ behavior: "smooth", block: "start" });
      };
      row.appendChild(a);
      li.appendChild(row);

      if (n.children.length) li.appendChild(renderNodes(n.children));
      ul.appendChild(li);
    }
    return ul;
  };

  ol.appendChild(renderNodes(buildHeadingTree(items)));
}

/* =================== Theme system =================== */
function applyTheme(id) {
  const t = THEMES[id];
  if (!t) return;
  state.theme = id;
  for (const [k, v] of Object.entries(t.vars)) {
    document.documentElement.style.setProperty(k, v);
  }
  document.documentElement.dataset.theme = t.type;
  document.body.dataset.theme = t.type;
  $("hljs-css").href = `https://esm.sh/highlight.js@11.10.0/styles/${t.hljs}.css`;
  document.querySelector('meta[name="theme-color"]')?.setAttribute("content", t.vars["--bg"]);
  $("themeSelect").value = id;
  localStorage.setItem("meridian:theme", id);
  if (state.view) {
    state.view.dispatch({
      effects: themeCompartment.reconfigure(makeCmTheme(t.type === "dark"))
    });
    renderPreview();
  }
}

function buildThemePicker() {
  const sel = $("themeSelect");
  const groups = { light: [], dark: [] };
  for (const [id, t] of Object.entries(THEMES)) groups[t.type].push([id, t.name]);
  for (const type of ["light", "dark"]) {
    if (!groups[type].length) continue;
    const og = document.createElement("optgroup");
    og.label = type === "light" ? "Light" : "Dark";
    for (const [id, name] of groups[type]) {
      const o = document.createElement("option");
      o.value = id; o.textContent = name;
      og.appendChild(o);
    }
    sel.appendChild(og);
  }
  sel.addEventListener("change", () => applyTheme(sel.value));
}

/* =================== Default doc =================== */
const DEFAULT = `# Welcome to Meridian

A markdown editor and previewer — a PWA inspired by [Clearly](https://clearly.md/).

## What's here

- **CodeMirror** editor with markdown syntax highlighting
- **Live preview** with GitHub Flavored Markdown
- Code blocks colored by *highlight.js*
- **Mermaid** diagrams
- 11 built-in themes (light + dark); add more by appending to \`THEMES\`
- Open & save \`.md\` files (File System Access where available)
- Works **offline** — install it from your browser

## Code

\`\`\`js
function greet(name) {
  return \`Hello, \${name}!\`;
}
\`\`\`

## Diagram

\`\`\`mermaid
graph LR
  A[Write] --> B[Preview]
  B --> C[Export PDF]
\`\`\`

## Tasks

- [x] Open or create a file
- [ ] Pick a theme you like
- [ ] Save (Ctrl/Cmd+S)

## Shortcuts

| Action       | Shortcut               |
|--------------|------------------------|
| Bold         | Ctrl/Cmd + B           |
| Italic       | Ctrl/Cmd + I           |
| Inline code  | Ctrl/Cmd + \`          |
| Link         | Ctrl/Cmd + K           |
| Find         | Ctrl/Cmd + F           |
| New / Open   | Ctrl/Cmd + N / O       |
| Save / As    | Ctrl/Cmd + S / Shift+S |
| Print / PDF  | Ctrl/Cmd + P           |
`;

/* =================== File I/O =================== */
const fileTypes = [{
  description: "Markdown",
  accept: { "text/markdown": [".md", ".markdown"], "text/plain": [".txt"] }
}];
const hasFSA = "showOpenFilePicker" in window;

async function ensureWritable(handle) {
  if (!handle?.queryPermission) return true;
  const opts = { mode: "readwrite" };
  if (await handle.queryPermission(opts) === "granted") return true;
  try { return (await handle.requestPermission(opts)) === "granted"; }
  catch { return false; }
}

async function openFile() {
  if (hasFSA) {
    try {
      const [h] = await showOpenFilePicker({ types: fileTypes, multiple: false });
      await ensureWritable(h);
      const f = await h.getFile();
      loadDoc(await f.text(), f.name, h);
    } catch (e) {
      if (e?.name === "AbortError") return;
      console.error("Open failed:", e);
      alert("Open failed: " + (e?.message || e));
    }
    return;
  }
  pickViaInput();
}

function pickViaInput() {
  const inp = $("finput");
  inp.onchange = async () => {
    const f = inp.files?.[0]; inp.value = "";
    if (!f) return;
    loadDoc(await f.text(), f.name, null);
  };
  inp.click();
}

function loadDoc(text, name, handle) {
  setDoc(text);
  state.handle = handle;
  state.lastSaved = text;
  setName(name);
  setStatus(handle ? "saved" : "");
  localStorage.setItem("meridian:draft", text);
}

let saveTimer;
function scheduleSave() {
  if (!state.handle) { setStatus("dirty"); return; }
  setStatus("saving");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(autoSave, 500);
}

async function autoSave() {
  if (!state.handle?.createWritable) return;
  const text = getDoc();
  try {
    const w = await state.handle.createWritable();
    await w.write(text);
    await w.close();
    state.lastSaved = text;
    setStatus("saved");
  } catch (e) {
    console.error("Auto-save failed:", e);
    setStatus("error");
  }
}

async function saveAs() {
  const text = getDoc();
  try {
    if ("showSaveFilePicker" in window) {
      const h = await showSaveFilePicker({ suggestedName: state.name, types: fileTypes });
      const w = await h.createWritable();
      await w.write(text); await w.close();
      state.handle = h; state.lastSaved = text;
      setName(h.name); setStatus("saved");
    } else {
      const blob = new Blob([text], { type: "text/markdown" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob); a.download = state.name;
      a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 1000);
      state.lastSaved = text; setStatus("");
    }
  } catch (e) { if (e?.name !== "AbortError") alert("Save failed: " + e.message); }
}

function newDoc() {
  if (state.handle == null && getDoc() !== state.lastSaved && !confirm("Discard unsaved changes?")) return;
  setDoc("");
  state.handle = null; state.lastSaved = "";
  setName("Untitled.md");
  setStatus("");
}

const setName = (n) => { state.name = n; $("docName").textContent = n; };

function setStatus(kind) {
  const el = $("status");
  el.className = "status" + (kind ? " " + kind : "");
  el.textContent = ({
    saving: "Saving…",
    saved:  "Saved",
    dirty:  "• Unsaved",
    error:  "Save failed",
    "":     ""
  })[kind] || "";
}

/* =================== Drag & Drop =================== */
function setupDragDrop() {
  let depth = 0;
  const isFileDrag = (e) =>
    e.dataTransfer && [...e.dataTransfer.types].includes("Files");

  addEventListener("dragenter", (e) => {
    if (!isFileDrag(e)) return;
    e.preventDefault();
    depth++;
    document.body.classList.add("dragging");
  });
  addEventListener("dragleave", (e) => {
    if (!isFileDrag(e)) return;
    if (--depth <= 0) { depth = 0; document.body.classList.remove("dragging"); }
  });
  addEventListener("dragover", (e) => {
    if (!isFileDrag(e)) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "copy";
  });
  addEventListener("drop", async (e) => {
    if (!isFileDrag(e)) return;
    e.preventDefault();
    depth = 0;
    document.body.classList.remove("dragging");
    const items = e.dataTransfer.items;
    if (!items?.length) return;
    const item = [...items].find((i) => i.kind === "file");
    if (!item) return;

    if (typeof item.getAsFileSystemHandle === "function") {
      try {
        const handle = await item.getAsFileSystemHandle();
        if (handle?.kind === "file") {
          await ensureWritable(handle);
          const f = await handle.getFile();
          loadDoc(await f.text(), f.name, handle);
          return;
        }
      } catch (err) {
        console.warn("Drop handle failed, using File fallback:", err);
      }
    }
    const f = item.getAsFile();
    if (f) loadDoc(await f.text(), f.name, null);
  });
}

/* =================== Init =================== */
function init() {
  buildThemePicker();
  const savedTheme = localStorage.getItem("meridian:theme");
  const fallback = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  applyTheme(savedTheme && THEMES[savedTheme] ? savedTheme : fallback);

  const initial = localStorage.getItem("meridian:draft") || DEFAULT;
  state.lastSaved = initial;

  let debounce;
  state.view = createEditor($("editor"), initial, (text) => {
    localStorage.setItem("meridian:draft", text);
    clearTimeout(debounce);
    debounce = setTimeout(renderPreview, 120);
    if (text !== state.lastSaved) scheduleSave();
  });

  renderPreview();
  setStatus(state.handle ? "saved" : "");

  $("new").onclick = newDoc;
  $("open").onclick = openFile;
  $("saveas").onclick = saveAs;
  $("print").onclick = () => window.print();

  const outlineEl = document.querySelector(".outline");
  const pvEl = document.querySelector(".pv");
  const outlineBtn = $("outlineBtn");
  const previewBtn = $("previewBtn");

  const savedOutline = localStorage.getItem("meridian:outline");
  outlineEl.hidden = savedOutline === "0";
  outlineBtn.classList.toggle("on", !outlineEl.hidden);

  const savedPreview = localStorage.getItem("meridian:preview");
  pvEl.hidden = savedPreview !== "1";
  previewBtn.classList.toggle("on", !pvEl.hidden);

  outlineBtn.onclick = () => {
    outlineEl.hidden = !outlineEl.hidden;
    outlineBtn.classList.toggle("on", !outlineEl.hidden);
    localStorage.setItem("meridian:outline", outlineEl.hidden ? "0" : "1");
  };
  previewBtn.onclick = () => {
    pvEl.hidden = !pvEl.hidden;
    previewBtn.classList.toggle("on", !pvEl.hidden);
    localStorage.setItem("meridian:preview", pvEl.hidden ? "0" : "1");
    if (!pvEl.hidden) renderPreview();
  };

  window.addEventListener("keydown", (e) => {
    const mod = e.metaKey || e.ctrlKey;
    if (!mod) return;
    const k = e.key.toLowerCase();
    if (k === "s" && !e.shiftKey) { e.preventDefault(); state.handle ? autoSave() : saveAs(); }
    else if (k === "s" && e.shiftKey) { e.preventDefault(); saveAs(); }
    else if (k === "o") { e.preventDefault(); openFile(); }
    else if (k === "n" && !e.shiftKey) { e.preventDefault(); newDoc(); }
  });
  window.addEventListener("beforeunload", (e) => {
    if (!state.handle && getDoc() !== state.lastSaved) {
      e.preventDefault(); e.returnValue = "";
    }
  });

  setupDragDrop();

  if ("launchQueue" in window) {
    launchQueue.setConsumer(async (p) => {
      if (!p.files?.length) return;
      const h = p.files[0];
      await ensureWritable(h);
      const f = await h.getFile();
      loadDoc(await f.text(), f.name, h);
    });
  }

  if ("serviceWorker" in navigator) {
    addEventListener("load", () =>
      navigator.serviceWorker.register("./sw.js").catch(() => {}));
  }
}

try { init(); }
catch (e) {
  console.error("[Meridian] init() failed:", e);
  alert("Meridian failed to start: " + (e?.message || e) +
        "\n\nOpen DevTools (Cmd+Option+I) → Console for details.");
}
</script>
